name: proxy-configs ci

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/ci.yml"
      - "dist/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "dist/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release configs
    runs-on: ubuntu-latest

    steps:
      - name: Check out WincerChan/proxy-configs
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build dist configs
        run: python3 scripts/build-release.py

      - name: Validate Clash config
        run: python3 scripts/validate-clash.py

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Check generated dist files
        run: git diff --exit-code -- dist/clash/clash-naixi-stable.yaml dist/quanx/quantumultx-naixi-stable.conf

      - name: Upload dist configs
        uses: actions/upload-artifact@v4
        with:
          name: proxy-configs-dist
          path: |
            dist/clash/clash-naixi-stable.yaml
            dist/quanx/quantumultx-naixi-stable.conf
            dist/quanx/apple-push.list
            rules/apple-push.list
          if-no-files-found: error

      - name: Prepare dist branch files
        if: github.event_name != 'pull_request'
        run: |
          rm -rf /tmp/proxy-configs-dist
          mkdir -p /tmp/proxy-configs-dist
          cp dist/clash/clash-naixi-stable.yaml /tmp/proxy-configs-dist/
          cp dist/quanx/quantumultx-naixi-stable.conf /tmp/proxy-configs-dist/
          cp rules/apple-push.list /tmp/proxy-configs-dist/

      - name: Publish dist branch
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan dist-publish
          git rm -rf .
          cp /tmp/proxy-configs-dist/* .
          git add clash-naixi-stable.yaml quantumultx-naixi-stable.conf apple-push.list
          git commit -m "chore: publish built proxy configs"
          git push --force origin dist-publish:dist
