# FlClash / Mihomo - Naixi final config with emoji policy groups
# Fill proxy-providers.Naixi.url with your Naixi Clash/Mihomo subscription URL.
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - 223.5.5.5
  - 119.29.29.29
proxy-providers:
  Naixi:
    type: http
    url: '' # todo
    interval: 86400
    path: ./providers/naixi.yaml
    override:
      udp: true
proxy-groups:
- name: 🚀 代理
  type: select
  proxies:
  - 🧭 节点选择
  - ♻️ 自动低延迟
  - 🛟 故障切换
  - 🇭🇰 香港自动
  - 🇹🇼 台湾自动
  - 🇯🇵 日本自动
  - 🇸🇬 新加坡自动
  - 🇺🇸 美国自动
  - 🇰🇷 韩国自动
  - 🇬🇧 英国自动
  - 🇪🇺 欧洲自动
  - 🇨🇦 加拿大自动
  - 🇦🇺 澳洲自动
  - DIRECT
- name: 🧭 节点选择
  type: select
  use:
  - Naixi
  filter: (?i).*
  exclude-filter: (?i)(premium|\[premium\]|剩余|流量|套餐|官网|到期|expire|traffic|reset|days
    left|expire date|^[0-9.]+[ ]*[KMGT]?B?[ ]*\|[ ]*[0-9.]+[ ]*[KMGT]?B?$)
- name: 📊 流量看板
  type: select
  use:
  - Naixi
  filter: (?i)(剩余|流量|套餐|官网|到期|expire|traffic|reset|days left|expire date|^[0-9.]+[
    ]*[KMGT]?B?[ ]*\|[ ]*[0-9.]+[ ]*[KMGT]?B?$)
- name: ♻️ 自动低延迟
  type: url-test
  use:
  - Naixi
  filter: (?i)(hong[ ]*kong|香港|港|HK|taiwan|台湾|台北|taipei|TW|japan|日本|东京|大阪|tokyo|osaka|JP|singapore|新加坡|狮城|SG|usa|united[
    ]*states|seattle|san[ ]*jose|los[ ]*angeles|new[ ]*york|dallas|ashburn|chicago|US|korea|韩国|首尔|seoul|KR|united[
    ]*kingdom|britain|london|UK|netherlands|germany|switzerland|france|sweden|bulgaria|austria|ireland|turkey|hungary|russia|canada|australia|sydney)
  exclude-filter: (?i)(premium|\[premium\]|剩余|流量|套餐|官网|到期|expire|traffic|reset|days
    left|expire date|^[0-9.]+[ ]*[KMGT]?B?[ ]*\|[ ]*[0-9.]+[ ]*[KMGT]?B?$)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 80
  timeout: 5000
  lazy: false
- name: 🛟 故障切换
  type: fallback
  use:
  - Naixi
  filter: (?i)(hong[ ]*kong|香港|港|HK|taiwan|台湾|台北|taipei|TW|japan|日本|东京|大阪|tokyo|osaka|JP|singapore|新加坡|狮城|SG|usa|united[
    ]*states|seattle|san[ ]*jose|los[ ]*angeles|new[ ]*york|dallas|ashburn|chicago|US|korea|韩国|首尔|seoul|KR|united[
    ]*kingdom|britain|london|UK|netherlands|germany|switzerland|france|sweden|bulgaria|austria|ireland|turkey|hungary|russia|canada|australia|sydney)
  exclude-filter: (?i)(premium|\[premium\]|剩余|流量|套餐|官网|到期|expire|traffic|reset|days
    left|expire date|^[0-9.]+[ ]*[KMGT]?B?[ ]*\|[ ]*[0-9.]+[ ]*[KMGT]?B?$)
  url: http://www.gstatic.com/generate_204
  interval: 300
  timeout: 5000
  lazy: false
